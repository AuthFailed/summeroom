<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Заказ оформлен · Комната лета</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="robots" content="noindex" />
  </head>
  <body class="page">
    <header class="site-header">
      <div class="logo"><a href="/">Комната <span class="italic">лета</span>.</a></div>
    </header>

    <main class="status-page">
      <div class="card status-card">
        <h1 id="title">Проверяем оплату…</h1>
        <p id="desc">Это может занять несколько секунд. Не закрывайте страницу.</p>
        <div class="spinner" id="spinner"></div>
        <dl id="details" hidden>
          <dt>Номер заказа</dt><dd id="orderNumber">—</dd>
          <dt>Сумма</dt><dd id="orderTotal">—</dd>
          <dt>Статус</dt><dd id="orderStatus">—</dd>
        </dl>
        <div class="actions" id="actions" hidden>
          <a href="/" class="btn-primary">В каталог</a>
        </div>
      </div>
    </main>

    <script type="module" src="/src/order-success.ts"></script>
  </body>
</html>
